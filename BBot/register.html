<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - BursaryBot AI Assistant</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0f766e, #0d5c56); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .register-container { background: white; border-radius: 24px; padding: 40px; width: 500px; max-width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 2rem; background: linear-gradient(135deg, #0f766e, #0d5c56); background-clip: text; -webkit-background-clip: text; color: transparent; }
        h2 { text-align: center; margin-bottom: 25px; color: #1e293b; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #1e293b; }
        input, select { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; }
        input:focus, select:focus { outline: none; border-color: #0f766e; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #0f766e, #0d5c56); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .login-link { text-align: center; margin-top: 20px; color: #64748b; }
        .login-link a { color: #0f766e; text-decoration: none; }
        .alert { padding: 12px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .alert-error { background: #fee2e2; color: #991b1b; }
        .alert-success { background: #d1fae5; color: #065f46; }
        .info-text { font-size: 12px; color: #64748b; margin-top: 5px; }
        h3 { margin: 20px 0 15px 0; color: #1e293b; font-size: 1.1rem; }
        hr { margin: 15px 0; border: none; border-top: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo"><h1>🤖 BursaryBot</h1></div>
        <h2>Create Free Account</h2>
        <div id="alertContainer"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Username *</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="phone">
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password *</label>
                <input type="password" id="confirm_password" required>
            </div>
            
            <hr>
            <h3>📚 Academic Information (For Better Matches)</h3>
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="full_name">
            </div>
            <div class="form-group">
                <label>Field of Study</label>
                <select id="field_of_study">
                    <option value="">Select</option>
                    <option value="IT">Information Technology (IT)</option>
                    <option value="Agriculture">Agriculture</option>
                    <option value="Public Management">Public Management</option>
                </select>
            </div>
            <div class="form-group">
                <label>Institution</label>
                <select id="institution">
                    <option value="">Select</option>
                    <option value="DUT">Durban University of Technology</option>
                    <option value="MUT">Mangosuthu University of Technology</option>
                </select>
            </div>
            <div class="form-group">
                <label>Province</label>
                <select id="province">
                    <option value="">Select</option>
                    <option value="Gauteng">Gauteng</option>
                    <option value="Western Cape">Western Cape</option>
                    <option value="KwaZulu-Natal">KwaZulu-Natal</option>
                    <option value="Eastern Cape">Eastern Cape</option>
                    <option value="Free State">Free State</option>
                    <option value="Limpopo">Limpopo</option>
                    <option value="Mpumalanga">Mpumalanga</option>
                    <option value="North West">North West</option>
                    <option value="Northern Cape">Northern Cape</option>
                </select>
            </div>
            <div class="form-group">
                <label>Year of Study</label>
                <select id="year_of_study">
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3">3rd Year</option>
                    <option value="4">4th Year</option>
                </select>
            </div>
            <div class="form-group">
                <label>Average Mark (%)</label>
                <input type="number" id="average_mark" step="0.01" min="0" max="100">
            </div>
            <div class="form-group">
                <label>Parent/Guardian Income (ZAR)</label>
                <input type="number" id="parent_income">
            </div>
            
            <button type="submit">Create Account & Start Chatting</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>

const form = document.getElementById('registerForm');

form.addEventListener('submit', async (e) => {

    e.preventDefault();

    const username =
        document.getElementById('username').value;

    const email =
        document.getElementById('email').value;

    const phone =
        document.getElementById('phone').value;

    const password =
        document.getElementById('password').value;

    try {

        const response = await fetch('https://bursarybot-backend.onrender.com/api/auth/register', 
            {
                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({
                    username,
                    email,
                    phone,
                    password
                })
            }
        );

        const data = await response.json();

        console.log(data);

        if (data.success) {

            alert('Registration successful');

            window.location.href = 'login.html';

        } else {

            alert(data.message);
        }

    } catch (error) {

        console.error(error);

        alert('Failed to connect to server');
    }
});

</script>
</body>
</html>
