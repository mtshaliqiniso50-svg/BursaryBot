<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BursaryBot AI Assistant</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0f766e, #0d5c56); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-container { background: white; border-radius: 24px; padding: 40px; width: 450px; max-width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 2rem; background: linear-gradient(135deg, #0f766e, #0d5c56); background-clip: text; -webkit-background-clip: text; color: transparent; }
        h2 { text-align: center; margin-bottom: 25px; color: #1e293b; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #1e293b; }
        input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; }
        input:focus { outline: none; border-color: #0f766e; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #0f766e, #0d5c56); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .register-link { text-align: center; margin-top: 20px; color: #64748b; }
        .register-link a { color: #0f766e; text-decoration: none; }
        .alert { padding: 12px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .alert-error { background: #fee2e2; color: #991b1b; }
        .alert-success { background: #d1fae5; color: #065f46; }
        .demo-info { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-top: 20px; font-size: 13px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo"><h1>🤖 BursaryBot</h1></div>
        <h2>Welcome Back</h2>
        <div id="alertContainer"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username or Email</label>
                <input type="text" id="username" required placeholder="Enter your username or email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            <button type="submit">Login to Chat</button>
        </form>
        
        <div class="register-link">
            Don't have an account? <a href="register.html">Sign up here</a>
        </div>

    </div>

    <script>
        const API_URL = 'https://bursarybot-backend.onrender.com/api';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role: 'student' })
                });
                
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.message);
                
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/dashboard.html', 1000);
                
            } catch (error) {
                showAlert(error.message, 'error');
            }
        });
        
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }
    </script>
</body>
</html>
